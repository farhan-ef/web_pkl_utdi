<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PKL UTDI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-page">
    <div id="notification-container"></div>

    <div class="card login-card fade-in">
        <div class="login-header">
            <img src="assets/img/logo.png" alt="Logo">
            <h1>PKL UTDI</h1>
            <p style="color: var(--text-muted);">Masukkan akun untuk melanjutkan</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Kerja</label>
                <input type="email" id="email" placeholder="nama@instansi.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Kata Sandi</label>
                <input type="password" id="password" placeholder="sandi" required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> &nbsp;Masuk ke Dashboard
            </button>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');

            // Cek jika baru logout
            if (sessionStorage.getItem('justLoggedOut') === 'true') {
                sessionStorage.removeItem('justLoggedOut');
                console.log('👋 User baru logout, tetap di halaman login');
                return;
            }

            // Auto redirect jika sudah login
            const user = isLoggedIn();
            if (user && user.role) {
                console.log('✅ User sudah login, redirecting...', user);
                redirectByRole(user);
            }

            // Handle login form submit
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                console.log('🔑 Login attempt - Email:', email);

                loginBtn.disabled = true;
                loginBtn.innerHTML = '⏳ Menghubungkan...';

                try {
                    const user = await login(email, password);
                    
                    console.log('🎉 Login success! User:', user);
                    
                    if (!user || !user.role) {
                        console.error('❌ User data invalid:', user);
                        throw new Error('Data user tidak valid - Role: ' + (user?.role || 'undefined'));
                    }
                    
                    showNotification('Login berhasil! Mengarahkan...', 'success');
                    
                    setTimeout(() => {
                        console.log('🚀 Redirecting to dashboard for role:', user.role);
                        redirectByRole(user);
                    }, 1000);
                } catch (error) {
                    console.error('💥 Login failed:', error);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> &nbsp;Masuk ke Dashboard';
                    showNotification(error.message || 'Login gagal', 'error');
                }
            });
        });
    </script>
</body>
</html>
