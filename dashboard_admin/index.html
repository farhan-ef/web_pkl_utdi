<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PKL UTDI</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="notification-container"></div>
    <div id="sidebar-container"></div>
    
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <main class="container fade-in">
            
            <!-- SECTION: RINGKASAN (Dashboard Home) -->
            <div id="section-ringkasan">
                <div class="card" style="display: flex; gap: 20px; align-items: center; margin-bottom: 25px; border-left: 5px solid var(--primary);">
                    <div style="background: #f0f4f8; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.5rem;">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <h2 id="adminName" style="margin: 0; font-size: 1.25rem;">Admin</h2>
                        </div>
                        <div style="display: flex; gap: 15px; margin-top: 5px; font-size: 0.85rem; color: var(--text-muted);">
                            <span><i class="fas fa-crown" style="color: gold;"></i> Administrator</span>
                        </div>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="grid grid-3" style="margin-bottom: 25px;">
                    <div class="card stat-card" style="border-top: 4px solid var(--accent);">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TOTAL SISWA</div>
                                <h3 id="statSiswa" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--primary);">-</h3>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Peserta PKL</p>
                            </div>
                            <div style="background: #eff6ff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent);">
                                <i class="fas fa-user-graduate" style="font-size: 1.25rem;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="card stat-card" style="border-top: 4px solid var(--success);">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TOTAL GURU/MENTOR</div>
                                <h3 id="statMentor" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--primary);">-</h3>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Pembimbing</p>
                            </div>
                            <div style="background: #dcfce7; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--success);">
                                <i class="fas fa-chalkboard-teacher" style="font-size: 1.25rem;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="card stat-card" style="border-top: 4px solid var(--warning);">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TOTAL USER</div>
                                <h3 id="statUsers" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--primary);">-</h3>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Akun Sistem</p>
                            </div>
                            <div style="background: #fef3c7; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--warning);">
                                <i class="fas fa-users" style="font-size: 1.25rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION: KELOLA USER -->
            <div id="section-user" style="display: none;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 class="card-title" style="margin: 0; border: none; padding: 0;"><i class="fas fa-users"></i> Kelola User</h3>
                        <button onclick="showAddUserModal()" class="btn btn-primary" style="width: auto;">
                            <i class="fas fa-plus"></i> Tambah User
                        </button>
                    </div>
                    <div id="userTableContainer">
                        <p style="text-align: center; padding: 20px;">Memuat data...</p>
                    </div>
                </div>
            </div>

            <!-- SECTION: SETTING GPS -->
            <div id="section-gps" style="display: none;">
                <div class="card" style="max-width: 600px;">
                    <h3 class="card-title"><i class="fas fa-map-marker-alt"></i> Pengaturan Lokasi & Radius</h3>
                    <form id="gpsForm">
                        <div class="form-group">
                            <label>Latitude</label>
                            <input type="number" step="any" id="gpsLat" placeholder="-7.79..." required>
                        </div>
                        <div class="form-group">
                            <label>Longitude</label>
                            <input type="number" step="any" id="gpsLng" placeholder="110.36..." required>
                        </div>
                        <div class="form-group">
                            <label>Radius (Meter)</label>
                            <input type="number" id="gpsRadius" placeholder="100" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Simpan Pengaturan
                        </button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="../config.js"></script>
    <script src="../components/utils.js"></script> <!-- Untuk fungsi logout, notif dll -->
    <script src="../app.js"></script> <!-- Untuk fungsi API -->
    <script src="admin.js"></script>
</body>
</html>
