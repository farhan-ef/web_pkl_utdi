<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa - PKL UTDI</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="notification-container"></div>
    <div id="sidebar-container"></div>
    
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    
    <div class="main-wrapper">
        <main class="container fade-in">
            <div class="card" style="display: flex; gap: 20px; align-items: center; margin-bottom: 25px; border-left: 5px solid var(--primary);">
                <div style="background: #f0f4f8; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.5rem;">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <h2 id="profileNama" style="margin: 0; font-size: 1.25rem;">-</h2>
                        <button onclick="openEditProfileModal()" style="background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.9rem;" title="Edit Profil">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                    <div style="display: flex; gap: 15px; margin-top: 5px; font-size: 0.85rem; color: var(--text-muted);">
                        <span><i class="fas fa-school" style="color: #6c757d;"></i> <span id="profileSekolah">-</span></span>
                        <span><i class="fas fa-calendar-alt" style="color: #6c757d;"></i> <span id="profilePeriode">-</span></span>
                    </div>
                </div>
            </div>

            <div class="grid grid-3" style="margin-bottom: 25px;">
                <div class="card stat-card" style="border-top: 4px solid var(--warning);">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">STATUS HARI INI</div>
                            <h3 id="statusHariIni" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--primary);">Belum Absen</h3>
                            <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Absensi</p>
                        </div>
                        <div style="background: #fef3c7; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--warning);">
                            <i class="fas fa-clock" style="font-size: 1.25rem;"></i>
                        </div>
                    </div>
                </div>

                <div class="card stat-card" style="border-top: 4px solid var(--success);">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TOTAL KEHADIRAN</div>
                            <h3 id="totalKehadiran" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--primary);">0</h3>
                            <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Pertemuan</p>
                        </div>
                        <div style="background: #dcfce7; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--success);">
                            <i class="fas fa-check-circle" style="font-size: 1.25rem;"></i>
                        </div>
                    </div>
                </div>

                <div class="card stat-card" style="border-top: 4px solid var(--accent);">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TUGAS</div>
                            <h3 id="totalTugas" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--primary);">0/0</h3>
                            <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Selesai/Total</p>
                        </div>
                        <div style="background: #eff6ff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent);">
                            <i class="fas fa-tasks" style="font-size: 1.25rem;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 25px;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 class="card-title" style="margin: 0; border: none; padding: 0;"><i class="fas fa-book-open"></i> Jurnal Terbaru</h3>
                        <a href="jurnal.html" style="font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 600;">Lihat Semua <i class="fas fa-arrow-right" style="margin-left: 5px;"></i></a>
                    </div>
                    <div id="jurnalTerbaru">
                        <p style="text-align: center; color: var(--text-muted); padding: 20px;">Memuat jurnal...</p>
                    </div>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 class="card-title" style="margin: 0; border: none; padding: 0;"><i class="fas fa-calendar-week"></i> Absensi Minggu Ini</h3>
                        <a href="absensi.html" style="font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 600;">Lihat Semua <i class="fas fa-arrow-right" style="margin-left: 5px;"></i></a>
                    </div>
                    <div id="absensiMingguIni">
                        <p style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                            <i class="fas fa-clipboard-list" style="font-size: 3rem; display: block; margin-bottom: 10px; opacity: 0.3;"></i>
                            Belum ada absensi minggu ini
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../components/utils.js"></script>
    <script src="sidebar.js"></script>
    <script src="../app.js"></script>
    <script src="siswa.js"></script>
</body>
</html>
