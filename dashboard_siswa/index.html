<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siswa Dashboard - PKL UTDI</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="notification-container"></div>
    <div id="navbar-container"></div>

    <main class="container fade-in">
        <!-- New Profile Card -->
        <div class="card" style="display: flex; gap: 20px; align-items: center; margin-bottom: 25px; border-left: 5px solid var(--primary);">
            <div style="background: #f0f4f8; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.5rem;">
                <i class="fas fa-user-graduate"></i>
            </div>
            <div style="flex: 1;">
                <h2 id="profileNama" style="margin: 0; font-size: 1.25rem;">-</h2>
                <div style="display: flex; gap: 15px; margin-top: 5px; font-size: 0.85rem; color: var(--text-muted);">
                    <span><i class="fas fa-school" style="color: #6c757d;"></i> <span id="profileSekolah">-</span></span>
                    <span><i class="fas fa-calendar-alt" style="color: #6c757d;"></i> <span id="profilePeriode">-</span></span>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-map-location-dot"></i> Presensi Kehadiran</h3>
            <p style="margin-bottom: 1rem; color: var(--text-muted);">Pastikan GPS aktif sebelum melakukan absensi.</p>
            <div id="absenFormContainer">
                <div class="form-group">
                    <label>Pilih Status:</label>
                    <select id="statusAbsen" class="form-control" style="width: 100%; margin-bottom: 10px;">
                        <option value="hadir">Hadir (Gunakan GPS)</option>
                        <option value="izin">Izin (Perlu Bukti)</option>
                        <option value="sakit">Sakit (Perlu Bukti)</option>
                    </select>
                </div>
                <div id="buktiInputContainer" style="display: none;" class="form-group">
                    <label>Link Bukti Drive:</label>
                    <input type="text" id="linkBukti" class="form-control" placeholder="https://drive.google.com/...">
                </div>
                <button id="absenBtn" class="btn btn-primary btn-block"><i class="fas fa-fingerprint"></i> &nbsp;Konfirmasi Kehadiran</button>
            </div>
            <div id="absenStatus" style="margin-top: 10px; font-weight: 600;"></div>
        </div>

        <div class="grid grid-3">
            <div class="card" style="grid-column: span 2;">
                <h3 class="card-title"><i class="fas fa-book-open"></i> Jurnal Harian</h3>
                <form id="jurnalForm">
                    <div class="form-group">
                        <label>Kegiatan Utama *</label>
                        <textarea id="kegiatan" placeholder="Apa yang Anda kerjakan hari ini?" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Catatan Tambahan (Opsional)</label>
                        <textarea id="catatan" placeholder="Kendala atau detail lainnya..."></textarea>
                    </div>
                    <button type="submit" id="saveJurnalBtn" class="btn btn-primary"><i class="fas fa-save"></i> &nbsp;Simpan Jurnal</button>
                </form>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <h4>Riwayat Jurnal</h4>
                <div id="jurnalHistory" style="margin-top: 15px;">
                    <p style="text-align: center; color: var(--text-muted);">Memuat riwayat...</p>
                </div>
            </div>
            <div class="card">
                <h3 class="card-title"><i class="fas fa-tasks"></i> Daftar Tugas</h3>
                <div id="tugasList">
                    <p style="text-align: center; color: var(--text-muted);">Memuat tugas...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../config.js"></script>
    <script src="../components/utils.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../app.js"></script>
    <script src="siswa.js"></script>
</body>
</html>
