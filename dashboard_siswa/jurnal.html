<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Harian - PKL UTDI</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="notification-container"></div>
    <div id="sidebar-container"></div>
    
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    
    <div class="main-wrapper">
        <main class="container fade-in">
            <div class="card">
                <h3 class="card-title"><i class="fas fa-book-open"></i> Jurnal Harian</h3>
                <form id="jurnalForm">
                    <div class="form-group">
                        <label>Kegiatan Utama *</label>
                        <textarea id="kegiatan" placeholder="Apa yang Anda kerjakan hari ini?" required rows="4"></textarea>
                    </div>
                    <button type="submit" id="saveJurnalBtn" class="btn btn-primary">
                        <i class="fas fa-save"></i> &nbsp;Simpan Jurnal
                    </button>
                </form>
                
                <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border-color);">
                
                <h4 style="margin-bottom: 20px; color: var(--primary);">
                    <i class="fas fa-history" style="margin-right: 8px;"></i> Riwayat Jurnal
                </h4>
                <div id="jurnalHistory">
                    <p style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
                        Memuat riwayat...
                    </p>
                </div>
            </div>

            <div class="card" style="border-top: 4px solid var(--accent); margin-top: 25px;">
                <div style="text-align: center; padding: 10px 0;">
                    <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">TOTAL JURNAL</div>
                    <h2 id="totalJurnal" style="font-size: 2.5rem; margin: 0; color: var(--primary);">0</h2>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin: 5px 0 0 0;">Entri jurnal</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../components/utils.js"></script>
    <script src="sidebar.js"></script>
    <script src="../app.js"></script>
    <script src="siswa.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadJurnalHistory();
            await updateTotalJurnal();
        });
    </script>
</body>
</html>
